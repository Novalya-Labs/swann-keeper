---
# Per-arch base images. The HA *Debian* (glibc) base ships s6-overlay v3 +
# bashio. Debian/glibc is required: @discordjs/opus, sherpa-onnx-node and
# @picovoice/porcupine-node only ship glibc prebuilds (no musl), and the
# @discordjs/opus from-source build fails on ARM64 (libopus NEON bug).
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm
labels:
  org.opencontainers.image.title: "Swann"
  org.opencontainers.image.source: "https://github.com/Novalya-Labs/swann-keeper"
