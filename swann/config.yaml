---
# =============================================================================
# Swann — Home Assistant add-on manifest.
#
# Runs ONLY the Node bot in a single container, supervised by the base image's
# s6-overlay v3. Because the image ships its own s6-overlay, `init: false` is
# REQUIRED so the Supervisor does not insert tini as PID 1 (otherwise s6 fails
# with "s6-overlay-suexec: fatal: can only run as pid 1"). Playback is
# @discordjs/voice + yt-dlp + ffmpeg (no Lavalink, no JVM). Ingress-only admin.
#
# The option keys below are snake_case and MUST mirror exactly the keys read by
# src/config.ts (loadHaOptions / HaOptions). The Supervisor writes the resolved
# values to /data/options.json on every start.
# =============================================================================
name: "Swann"
version: "0.6.0"
slug: "swann"
description: >-
  Discord music bot with @discordjs/voice + yt-dlp playback, natural-language
  control (Mistral function-calling + Voxtral) and a "Swann" wake word, plus an
  Ingress admin web UI.
url: "https://github.com/Novalya-Labs/swann-keeper"
# Raspberry Pi 5 is aarch64; amd64 kept for portability / testing.
arch:
  - aarch64
  - amd64

# The base image's s6-overlay v3 must be PID 1, so disable the Supervisor's own
# init injection. Without this the container dies immediately on start.
init: false

# --- Ingress web admin UI --------------------------------------------------
ingress: true
ingress_port: 8099
ingress_entry: "/"
panel_icon: "mdi:music"
panel_title: "Swann"
panel_admin: true

# --- Supervisor API (read own options at runtime if needed) ----------------
hassio_api: true

# Persistent volume /data holds /data/options.json plus user-supplied model
# files (the trained .ppn keyword and silero_vad.onnx).
map:
  - "addon_config:rw"

# --- User-editable options (rendered in the HA Configuration tab) -----------
options:
  discord_token: ""
  discord_app_id: ""
  discord_guild_id: ""
  mistral_api_key: ""
  mistral_chat_model: "mistral-medium-3-5"
  mistral_transcribe_model: "voxtral-mini-latest"
  mistral_chat_prompt_cost_per_1m: 0.4
  mistral_chat_completion_cost_per_1m: 2.0
  mistral_transcribe_cost_per_minute: 0.001
  kws_encoder_path: "/config/kws/encoder.onnx"
  kws_decoder_path: "/config/kws/decoder.onnx"
  kws_joiner_path: "/config/kws/joiner.onnx"
  kws_tokens_path: "/config/kws/tokens.txt"
  kws_keywords_path: "/config/kws/keywords.txt"
  kws_threshold: 0.25
  kws_score: 1.0
  kws_debug: false
  wake_mode: "transcribe"
  voice_wake_words: "swann,souane,swan,soane,soin"
  voice_language: "fr"
  silero_vad_path: "/config/silero_vad.onnx"
  tts_enabled: false
  tts_model_path: "/config/tts/fr_FR-siwis-medium.onnx"
  tts_tokens_path: "/config/tts/tokens.txt"
  tts_data_dir: "/config/tts/espeak-ng-data"
  tts_rate: 1.0
  ytdlp_path: "yt-dlp"
  ytdlp_format: "bestaudio[ext=webm]/bestaudio/best"
  ytdlp_cookies_path: ""
  search_limit_max: 25
  ingress_port: 8099
  admin_bind_address: "0.0.0.0"
  admin_ingress_only: true
  log_level: "info"
  text_wake_phrase: "Hey Swann"
  default_volume: 80

schema:
  discord_token: "password"
  discord_app_id: "str"
  discord_guild_id: "str?"
  mistral_api_key: "password"
  mistral_chat_model: "str"
  mistral_transcribe_model: "str"
  mistral_chat_prompt_cost_per_1m: "float?"
  mistral_chat_completion_cost_per_1m: "float?"
  mistral_transcribe_cost_per_minute: "float?"
  kws_encoder_path: "str"
  kws_decoder_path: "str"
  kws_joiner_path: "str"
  kws_tokens_path: "str"
  kws_keywords_path: "str"
  kws_threshold: "float(0,1)"
  kws_score: "float"
  kws_debug: "bool"
  wake_mode: "list(transcribe|kws)"
  voice_wake_words: "str?"
  voice_language: "str?"
  silero_vad_path: "str"
  tts_enabled: "bool"
  tts_model_path: "str?"
  tts_tokens_path: "str?"
  tts_data_dir: "str?"
  tts_rate: "float(0.5,2.0)?"
  ytdlp_path: "str?"
  ytdlp_format: "str?"
  ytdlp_cookies_path: "str?"
  search_limit_max: "int(1,50)?"
  ingress_port: "port"
  admin_bind_address: "str"
  admin_ingress_only: "bool"
  log_level: "list(trace|debug|info|warning|error)"
  text_wake_phrase: "str"
  default_volume: "int(0,100)"
